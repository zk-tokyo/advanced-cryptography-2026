name: PR Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-submissions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Use Rust stable
        run: rustup default stable

      - name: Validate and test changed submissions
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_REPO_FULL_NAME: ${{ github.event.pull_request.base.repo.full_name }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          PR_HEAD_REPO_FULL_NAME: ${{ github.event.pull_request.head.repo.full_name }}
          PR_USERNAME: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin "$BASE_REF"

          changed_files="$(mktemp)"
          submissions="$(mktemp)"
          export CHANGED_FILES="$changed_files"
          export SUBMISSIONS_FILE="$submissions"

          git diff --name-only --diff-filter=ACMRTD "origin/$BASE_REF...HEAD" > "$CHANGED_FILES"

          python3 <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path, PurePosixPath

          changed_files_path = Path(os.environ["CHANGED_FILES"])
          submissions_file_path = Path(os.environ["SUBMISSIONS_FILE"])
          author_association = os.environ["PR_AUTHOR_ASSOCIATION"]
          base_repo_full_name = os.environ["PR_BASE_REPO_FULL_NAME"]
          head_repo_full_name = os.environ["PR_HEAD_REPO_FULL_NAME"]
          username = os.environ["PR_USERNAME"]

          allowed_dependencies = {"ark-ff", "ark-bn254"}
          allowed_editions = {"2021", "2024"}
          allowed_languages = {"rust", "python"}
          allowed_python_requirements = {"sympy"}
          disallowed_dependency_sections = (
              "dev-dependencies",
              "build-dependencies",
              "target",
              "patch",
              "replace",
          )
          trusted_author_associations = {"OWNER", "MEMBER", "COLLABORATOR"}
          is_same_repository_pr = head_repo_full_name == base_repo_full_name
          maintenance_paths = {
              (".github", "workflows", "pr-test.yml"),
              ("scripts", "test-python-submission.sh"),
              ("scripts", "test-rust-submission.sh"),
          }

          def is_trusted_maintenance_change(path: PurePosixPath) -> bool:
              return (
                  (
                      is_same_repository_pr
                      or author_association in trusted_author_associations
                  )
                  and path.parts in maintenance_paths
              )

          changed_files = [
              line.strip()
              for line in changed_files_path.read_text().splitlines()
              if line.strip()
          ]

          if not changed_files:
              raise SystemExit("No changed files found in this PR.")

          submissions = set()
          weeks = set()
          maintenance_files = set()

          for changed_file in changed_files:
              path = PurePosixPath(changed_file)
              parts = path.parts

              if is_trusted_maintenance_change(path):
                  maintenance_files.add(changed_file)
                  continue

              if len(parts) < 5:
                  raise SystemExit(
                      f"Unauthorized path: {changed_file}. "
                      f"Only week*/submissions/{username}/** may be changed."
                  )

              week, submissions_dir, owner = parts[0], parts[1], parts[2]

              if not re.fullmatch(r"week[0-9]+", week):
                  raise SystemExit(
                      f"Unauthorized path: {changed_file}. "
                      f"Only week*/submissions/{username}/** may be changed."
                  )

              if submissions_dir != "submissions" or owner != username:
                  raise SystemExit(
                      f"Unauthorized path: {changed_file}. "
                      f"Only week*/submissions/{username}/** may be changed."
                  )

              if len(parts) < 6:
                  raise SystemExit(
                      f"Invalid submission path: {changed_file}. "
                      "Expected week/submissions/username/problem/language/..."
                  )

              problem = parts[3]
              language = parts[4]

              if language not in allowed_languages:
                  raise SystemExit(
                      f"Unsupported language: {language}. "
                      "This sample CI accepts rust and python only."
                  )

              problem_test_dir = Path(week) / "problems" / problem / language / "tests"
              if not problem_test_dir.is_dir():
                  raise SystemExit(
                      f"Unsupported problem/language pair: {problem}/{language}. "
                      f"Missing tests directory: {problem_test_dir}."
                  )

              changed_path_within_submission = parts[5:]
              allowed_python_files = {("solution.py",), ("requirements.txt",)}
              if (
                  language == "python"
                  and changed_path_within_submission not in allowed_python_files
              ):
                  raise SystemExit(
                      f"Invalid Python submission file: {changed_file}. "
                      "Python submissions may change solution.py and requirements.txt only."
                  )

              weeks.add(week)
              submissions.add((week, problem, language))

          if submissions and len(weeks) != 1:
              raise SystemExit("A PR must contain changes for exactly one week.")

          if not submissions:
              if maintenance_files:
                  submissions_file_path.write_text("")
                  raise SystemExit(0)

              raise SystemExit("No submission changes found in this PR.")

          def validate_rust_submission(week: str, problem: str, language: str) -> None:
              manifest_path = (
                  Path(week)
                  / "submissions"
                  / username
                  / problem
                  / language
                  / "Cargo.toml"
              )

              if not manifest_path.is_file():
                  raise SystemExit(f"Missing Cargo.toml: {manifest_path}")

              data = tomllib.loads(manifest_path.read_text())
              package = data.get("package", {})
              dependencies = data.get("dependencies", {})

              if package.get("name") != "submission":
                  raise SystemExit(f"{manifest_path}: [package].name must be 'submission'.")

              edition = str(package.get("edition", ""))
              if edition not in allowed_editions:
                  raise SystemExit(
                      f"{manifest_path}: [package].edition must be '2021' or '2024'."
                  )

              extra_dependencies = set(dependencies) - allowed_dependencies
              if extra_dependencies:
                  names = ", ".join(sorted(extra_dependencies))
                  raise SystemExit(
                      f"{manifest_path}: unsupported dependencies: {names}. "
                      "Only ark-ff and ark-bn254 are allowed."
                  )

              for section in disallowed_dependency_sections:
                  if section in data:
                      raise SystemExit(
                          f"{manifest_path}: [{section}] is not allowed in submissions."
                      )

              for dependency_name, dependency_spec in dependencies.items():
                  if isinstance(dependency_spec, dict):
                      forbidden_keys = {"path", "git", "registry"}
                      present_forbidden_keys = forbidden_keys & set(dependency_spec)
                      if present_forbidden_keys:
                          keys = ", ".join(sorted(present_forbidden_keys))
                          raise SystemExit(
                              f"{manifest_path}: dependency {dependency_name} uses "
                              f"forbidden keys: {keys}."
                          )

          def validate_python_submission(week: str, problem: str, language: str) -> None:
              submission_path = Path(week) / "submissions" / username / problem / language
              solution_path = submission_path / "solution.py"
              requirements_path = submission_path / "requirements.txt"

              if not solution_path.is_file():
                  raise SystemExit(f"Missing solution.py: {solution_path}")

              if not requirements_path.is_file():
                  raise SystemExit(f"Missing requirements.txt: {requirements_path}")

              for line_number, raw_line in enumerate(
                  requirements_path.read_text().splitlines(),
                  start=1,
              ):
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue

                  if line.startswith(("-", "http://", "https://", "git+")):
                      raise SystemExit(
                          f"{requirements_path}:{line_number}: unsupported requirement: {line}"
                      )

                  package_name = re.split(r"[<>=!~\[]", line, maxsplit=1)[0].strip()
                  normalized_name = package_name.lower().replace("_", "-")
                  if normalized_name not in allowed_python_requirements:
                      allowed = ", ".join(sorted(allowed_python_requirements))
                      raise SystemExit(
                          f"{requirements_path}:{line_number}: unsupported package "
                          f"{package_name}. Allowed packages: {allowed}."
                      )

          for week, problem, language in sorted(submissions):
              if language == "rust":
                  validate_rust_submission(week, problem, language)
              elif language == "python":
                  validate_python_submission(week, problem, language)
              else:
                  raise SystemExit(f"Unsupported language: {language}")

          submissions_file_path.write_text(
              "".join(
                  f"{week} {problem} {language}\n"
                  for week, problem, language in sorted(submissions)
              )
          )
          PY

          while read -r week problem language; do
            if [[ "$language" == "rust" ]]; then
              bash scripts/test-rust-submission.sh "$week" "$problem" "$PR_USERNAME"
            elif [[ "$language" == "python" ]]; then
              bash scripts/test-python-submission.sh "$week" "$problem" "$PR_USERNAME"
            else
              echo "error: unsupported language: $language" >&2
              exit 1
            fi
          done < "$SUBMISSIONS_FILE"
